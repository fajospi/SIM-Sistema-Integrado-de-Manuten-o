<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM - Sistema Integrado de Manutenção</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #2563eb;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
            
            /* Cores dos Status - Preenchimento Total */
            --color-ok: #16a34a; /* Verde */
            --color-anomalia: #dc2626; /* Vermelho */
            --color-na: #4b5563; /* Cinza */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        /* Cabeçalho */
        header {
            text-align: center;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header p {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Dados Iniciais */
        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background: #fff;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--secondary-color);
        }

        .form-group input:readonly {
            background: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
        }

        /* Grupos do Checklist */
        .group-section {
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .group-title {
            background: var(--primary-color);
            color: #fff;
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .checklist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 18px;
            border-bottom: 1px solid #e2e8f0;
            background: #fff;
            transition: background-color 0.2s;
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .checklist-item:hover {
            background-color: #f8fafc;
        }

        .item-text {
            font-size: 14px;
            font-weight: 500;
            padding-right: 15px;
            flex: 1;
            color: var(--text-color);
        }

        /* Opções de Seleção */
        .options-group {
            display: flex;
            gap: 0;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .radio-label {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-right: 1px solid var(--border-color);
            background-color: #fff;
            color: var(--text-color);
            transition: all 0.2s ease;
            user-select: none;
            min-width: 80px;
            text-align: center;
        }

        .radio-label:last-child {
            border-right: none;
        }

        .radio-label input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        /* Cores nos estados Selecionados */
        .radio-label-ok:hover { background-color: #f0fdf4; }
        .radio-label-ok:has(input:checked) {
            background-color: var(--color-ok);
            color: white;
            border-color: var(--color-ok);
        }

        .radio-label-anomalia:hover { background-color: #fef2f2; }
        .radio-label-anomalia:has(input:checked) {
            background-color: var(--color-anomalia);
            color: white;
            border-color: var(--color-anomalia);
        }

        .radio-label-na:hover { background-color: #f1f5f9; }
        .radio-label-na:has(input:checked) {
            background-color: var(--color-na);
            color: white;
            border-color: var(--color-na);
        }

        /* Observações e Enviar */
        .obs-section { margin-top: 25px; }
        .obs-section label { font-weight: 600; margin-bottom: 8px; display: block; }
        .obs-section textarea {
            width: 100%; height: 120px; padding: 15px;
            border: 1px solid var(--border-color); border-radius: 8px;
            resize: vertical; font-size: 14px; outline: none;
        }

        .btn-submit {
            display: block; width: 100%; background: var(--secondary-color); color: #fff;
            padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 25px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
        }
        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* Responsividade */
        @media (max-width: 650px) {
            .checklist-item { flex-direction: column; align-items: flex-start; gap: 12px; }
            .options-group { width: 100%; }
            .radio-label { padding: 12px 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SIM</h1>
        <p>Sistema Integrado de Manutenção</p>
    </header>

                <label for="dataHora">Data e Hora</label>
                <input type="text" id="dataHora" readonly>
            </div>
            <div class="form-group">
                <label for="responsavel">Responsável pelo Checklist</label>
                <input type="text" id="responsavel" required placeholder="Nome completo">
